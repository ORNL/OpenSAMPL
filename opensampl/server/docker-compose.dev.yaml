services:
  db:
    image: savannah.ornl.gov/opensampl/db:latest
    ports:
      - "5415:5432"
    volumes:
      - castdb:/home/postgres/pgdata/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 5s
      retries: 5
      start_period: 10s
      timeout: 3s
    command: >
      postgres
        -c shared_preload_libraries=timescaledb,pg_cron
        -c cron.database_name=${POSTGRES_DB}

  grafana:
    image: savannah.ornl.gov/opensampl/grafana:latest
    build:
      context: ./grafana
    restart: unless-stopped
    ports:
      - "3015:3000"
    env_file:
      - grafana/grafana.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana


  migrations:
    image: savannah.ornl.gov/opensampl/migrations:latest
    build:
      context: migrations
    restart: "no"
    environment:
      - DB_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy


  backend:
    image: savannah.ornl.gov/opensampl/backend:latest
    build:
      context: backend
      target: dev
    ports:
      - "8015:8000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ROUTE_TO_BACKEND=false
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL}
      - USE_API_KEY=${USE_API_KEY}
      - API_KEYS=${API_KEYS}
    volumes:
      - ../..:/tmp/opensampl
    depends_on:
      db:
        condition: service_healthy

volumes:
  castdb:
  grafana-data: