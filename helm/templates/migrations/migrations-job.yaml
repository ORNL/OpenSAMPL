{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "opensampl.fullname" . }}-migrations
spec:
  template:
    spec:
      containers:
      - name: migrations
        image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
        env:
          - name: DATABASE_URL
            value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "opensampl.fullname" . }}-db:{{ .Values.db.port }}/{{ .Values.db.database }}
        envFrom:
          - secretRef:
              name: {{ include "opensampl.fullname" . }}-db-secret
          - configMapRef:
              name: {{ include "opensampl.fullname" . }}-db-config
      restartPolicy: OnFailure
{{- end }}