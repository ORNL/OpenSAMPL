apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensampl.fullname" . }}-backend
  labels:
    {{- include "opensampl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "opensampl.name" . }}-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000