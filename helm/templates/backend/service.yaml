apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensampl.fullname" . }}-backend
  labels:
    {{- include "opensampl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opensampl.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    role: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000