apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensampl.name" . }}-grafana
  labels:
    {{- include "opensampl.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "opensampl.name" . }}-grafana
  template:
    metadata:
      labels:
        app: {{ include "opensampl.name" . }}-grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: {{ .Values.grafana.port }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword }}
