apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opensampl.fullname" . }}-db
spec:
  serviceName: {{ include "opensampl.fullname" . }}-db
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "opensampl.name" . }}-db
  template:
    metadata:
      labels:
        app: {{ include "opensampl.name" . }}-db
    spec:
      containers:
        - name: db
          image: {{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.db.database }}
            - name: POSTGRES_USER
              value: {{ .Values.db.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opensampl.fullname" . }}-db-secret
                  key: password
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.db.persistence.size }}
