apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensampl.name" . }}-backend
  labels:
    {{- include "opensampl.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      name: http
  selector:
    app: {{ include "opensampl.name" . }}-backend
