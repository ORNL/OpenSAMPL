# Global settings
global:
  imagePullPolicy: IfNotPresent

# PostgreSQL Database
db:
  image:
    #repository: ghcr.io/mzinternallab/opensampl-dbc
    repository: ghcr.io/ornl/opensampl-db
    tag: latest
  username: opensampl
  password: opensampl
  grafanaPassword: grafana123
  database: opensampl
  port: 5432
  storage: 10Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Backend service
backend:
  image:
    repository: ghcr.io/ornl/opensampl-backend
    tag: latest
  replicas: 1
  port: 8000
  env:
    # Additional backend environment variables (merged automatically)
    LOG_LEVEL: INFO
    USE_API_KEY: "false"

# Grafana service
grafana:
  image:
    repository: grafana/grafana
    tag: "10.0.0"
  replicas: 1
  port: 3000
  adminUser: admin
  adminPassword: admin
  database:
    enabled: true
    type: postgres
    host: opensampl-db
    port: 5432
    name: opensampl
    user: opensampl

# Migrations (optional)
migrations:
  enabled: true
  image:
    repository: ghcr.io/ornl/opensampl-migrations
    tag: latest
  env: {}

# Ingress (optional)
ingress:
  enabled: false
  className: nginx
  host: opensampl.local
